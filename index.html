<script type="text/babel">
/* ====================================================================
   CONDITION MONITOR – Full React App (CDN / PWA build)
   ==================================================================== */

const { useState, useEffect, useMemo, useCallback, useRef } = React;
const {
  ResponsiveContainer, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  ScatterChart, Scatter, ZAxis, BarChart, Bar, Cell, ReferenceLine,
} = Recharts;
const {
  Upload, Activity, GitBranch, MessageSquare, Database, AlertTriangle,
  CheckCircle2, TrendingUp, Loader2, Trash2, FlaskConical, Send, RefreshCw,
} = LucideReact;

/* ── design tokens ─────────────────────────────────────────────────── */
const C = {
  ground: "#E9EDEF", surface: "#FFFFFF", ink: "#16222C", muted: "#5C6B76",
  faint: "#8A97A0", line: "#D3DADE", teal: "#15706B", tealSoft: "#E2EEED",
  low: "#B65A35", mid: "#C0901F", good: "#2E7D5B",
};
const MONO = "ui-monospace, SFMono-Regular, Menlo, monospace";

/* ── canonical fields ───────────────────────────────────────────────── */
const FIELDS = [
  { key: "sleepScore",        label: "睡眠スコア",     dir: +1, kw: ["sleepscore","score"] },
  { key: "sleepDurationMin",  label: "睡眠時間(分)",   dir: +1, kw: ["sleeptime","totalsleep","duration","sleepminutes"] },
  { key: "deepSleepMin",      label: "深睡眠(分)",     dir: +1, kw: ["deepsleep","deep"] },
  { key: "remSleepMin",       label: "REM睡眠(分)",    dir: +1, kw: ["rem"] },
  { key: "hrv",               label: "HRV(ms)",        dir: +1, kw: ["hrv","rmssd","variability"] },
  { key: "restingHR",         label: "安静時心拍",     dir: -1, kw: ["resting","restheart","rhr","heartrate"] },
  { key: "stress",            label: "ストレス",       dir: -1, kw: ["stress","pressure"] },
  { key: "readiness",         label: "Readiness",      dir: +1, kw: ["readiness","recovery"] },
  { key: "steps",             label: "歩数",           dir:  0, kw: ["steps","step"] },
  { key: "workoutDurationMin",label: "運動時間(分)",   dir:  0, kw: ["sporttime","workout","exercise","activeminutes"] },
  { key: "workoutCalories",   label: "運動カロリー",   dir:  0, kw: ["calorie","kcal","calories"] },
  { key: "pai",               label: "PAI",            dir:  0, kw: ["pai"] },
];
const RECOVERY = { readiness:1.4, hrv:1.3, restingHR:1.1, sleepScore:1.1, deepSleepMin:0.9, sleepDurationMin:0.8, stress:0.9 };
const SUM_FIELDS = new Set(["steps","workoutDurationMin","workoutCalories"]);

/* ── math helpers ───────────────────────────────────────────────────── */
const pad  = n => String(n).padStart(2,"0");
const isN  = v => typeof v === "number" && isFinite(v);
const mean = a => a.length ? a.reduce((s,x)=>s+x,0)/a.length : NaN;
const std  = a => {
  if(a.length<2) return NaN;
  const m=mean(a);
  return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));
};
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

function pearson(xs,ys) {
  const px=[],py=[];
  for(let i=0;i<xs.length;i++) if(isN(xs[i])&&isN(ys[i])){px.push(xs[i]);py.push(ys[i]);}
  if(px.length<4) return {r:NaN,n:px.length};
  const mx=mean(px),my=mean(py);
  let num=0,dx=0,dy=0;
  for(let i=0;i<px.length;i++){const a=px[i]-mx,b=py[i]-my;num+=a*b;dx+=a*a;dy+=b*b;}
  const den=Math.sqrt(dx*dy);
  return {r:den?num/den:NaN,n:px.length};
}

function normDate(v) {
  if(v==null) return null;
  const raw=String(v).trim();
  if(!raw) return null;
  if(/^\d{10,13}$/.test(raw)){const n=Number(raw);const d=new Date(n<1e12?n*1000:n);return isNaN(d)?null:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
  let s=raw.split(/[ T]/)[0].replace(/\//g,"-");
  const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  const d=new Date(s);
  return isNaN(d)?null:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
const addDays = (iso,k) => {
  const d=new Date(iso+"T00:00:00");
  d.setDate(d.getDate()+k);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const scoreColor = s => !isN(s)?C.faint:s>=70?C.good:s>=45?C.mid:C.low;
const scoreLabel = s => !isN(s)?"—":s>=70?"良好":s>=45?"標準":"要回復";

/* ── storage (localStorage fallback for PWA) ────────────────────────── */
const STORE_KEY = "condition-monitor:v1";

async function loadStore() {
  try {
    if(window.storage){
      const r=await window.storage.get(STORE_KEY);
      return r?JSON.parse(r.value):null;
    }
  } catch{}
  try {
    const raw=localStorage.getItem(STORE_KEY);
    return raw?JSON.parse(raw):null;
  } catch{}
  return null;
}

async function saveStore(obj) {
  const json=JSON.stringify(obj);
  try { if(window.storage) await window.storage.set(STORE_KEY,json); } catch{}
  try { localStorage.setItem(STORE_KEY,json); } catch{}
}

/* ── build records ──────────────────────────────────────────────────── */
function buildRecords(files,mapping) {
  const day={};
  for(const f of files){
    if(!f.dateCol) continue;
    for(const row of f.rows){
      const date=normDate(row[f.dateCol]);
      if(!date) continue;
      if(!day[date]) day[date]={date};
      for(const fld of FIELDS){
        const src=mapping[fld.key];
        if(!src) continue;
        const [fi,col]=src.split("\u0000");
        if(Number(fi)!==f.idx) continue;
        const val=parseFloat(String(row[col]).replace(/[^0-9.\-]/g,""));
        if(!isFinite(val)) continue;
        if(SUM_FIELDS.has(fld.key)) day[date][fld.key]=(day[date][fld.key]||0)+val;
        else day[date][fld.key]=val;
      }
    }
  }
  return Object.values(day).sort((a,b)=>a.date<b.date?-1:1);
}

/* ── analyze ────────────────────────────────────────────────────────── */
function analyze(records) {
  if(!records||records.length===0) return null;
  const stats={};
  for(const fld of FIELDS){
    const vals=records.map(r=>r[fld.key]).filter(isN);
    if(vals.length>=3) stats[fld.key]={m:mean(vals),s:std(vals)||1};
  }
  const withDerived=records.map(r=>{
    let wsum=0,w=0;
    for(const k in RECOVERY){
      if(!isN(r[k])||!stats[k]) continue;
      const dir=FIELDS.find(f=>f.key===k).dir||1;
      const z=((r[k]-stats[k].m)/stats[k].s)*dir;
      wsum+=z*RECOVERY[k];w+=RECOVERY[k];
    }
    const condition=w?clamp(Math.round(50+14*(wsum/w)),0,100):null;
    let load=0,hasLoad=false;
    if(isN(r.workoutDurationMin)&&r.workoutDurationMin>0){
      const intensity=isN(r.workoutCalories)&&r.workoutCalories>0?clamp(r.workoutCalories/r.workoutDurationMin/8,0.6,2):1;
      load+=r.workoutDurationMin*intensity;hasLoad=true;
    }
    if(isN(r.steps)){load+=(r.steps/1000)*1.5;hasLoad=true;}
    if(isN(r.pai)){load+=r.pai;hasLoad=true;}
    return {...r,condition,load:hasLoad?Math.round(load*10)/10:null};
  });
  const byDate={};withDerived.forEach(r=>byDate[r.date]=r);
  const lags=[0,1,2,3].map(k=>{
    const xs=[],ys=[];
    withDerived.forEach(r=>{const t=byDate[addDays(r.date,k)];if(r&&t){xs.push(r.load);ys.push(t.condition);}});
    return {k,...pearson(xs,ys)};
  });
  const driverKeys=["load","hrv","restingHR","deepSleepMin","sleepDurationMin","stress","steps","sleepScore"];
  const drivers=driverKeys.map(key=>{
    const xs=[],ys=[];
    withDerived.forEach(r=>{const t=byDate[addDays(r.date,1)];if(r&&t){xs.push(r[key]);ys.push(t.condition);}});
    const lbl=key==="load"?"トレーニング負荷":(FIELDS.find(f=>f.key===key)?.label||key);
    return {key,label:lbl,...pearson(xs,ys)};
  }).filter(d=>isN(d.r)).sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
  const scatter=[];
  withDerived.forEach(r=>{
    const t=byDate[addDays(r.date,1)];
    if(r&&t&&isN(r.load)&&isN(t.condition)) scatter.push({load:r.load,condition:t.condition});
  });
  const flags=[];
  const latest=withDerived[withDerived.length-1];
  const prior=withDerived.slice(-8,-1);
  const baseOf=k=>{const v=prior.map(r=>r[k]).filter(isN);return v.length>=3?mean(v):NaN;};
  if(latest){
    const checks=[
      ["hrv",(l,b)=>l<b*0.9,"HRVが平常より低下（回復が追いついていないサイン）"],
      ["restingHR",(l,b)=>l>b*1.05,"安静時心拍が高め（疲労 or 体調変化の可能性）"],
      ["deepSleepMin",(l,b)=>l<b*0.8,"深睡眠がいつもより少ない"],
      ["sleepDurationMin",(l,b)=>l<b*0.85,"睡眠時間が短い"],
      ["stress",(l,b)=>l>b*1.15,"ストレス指標が高い"],
    ];
    for(const [k,test,msg] of checks){
      const b=baseOf(k);
      if(isN(latest[k])&&isN(b)&&test(latest[k],b)) flags.push({type:"warn",msg});
    }
    if(isN(latest.condition)){
      if(latest.condition>=70) flags.push({type:"good",msg:"コンディション良好。負荷の高いセッションを入れる好機。"});
      else if(latest.condition<45) flags.push({type:"warn",msg:"コンディション低め。今日は強度を落とすか回復を優先。"});
    }
  }
  return {records:withDerived,stats,lags,drivers,scatter,flags,latest,byDate};
}

/* ── sample data ────────────────────────────────────────────────────── */
function sampleRecords() {
  const out=[];let base=new Date();base.setDate(base.getDate()-29);
  let hrv=55,rhr=52;
  for(let i=0;i<30;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const hard=i%4===1||i%7===0;
    const workout=hard?60+Math.random()*40:(Math.random()<0.4?30:0);
    hrv+=(55-hrv)*0.3+(hard?-8:4)+(Math.random()*6-3);
    rhr+=(52-rhr)*0.3+(hard?3:-1.5)+(Math.random()*2-1);
    out.push({
      date:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
      sleepScore:Math.round(clamp(82-(hard?6:0)+(Math.random()*10-5),50,99)),
      sleepDurationMin:Math.round(clamp(430-(hard?25:0)+(Math.random()*60-30),320,540)),
      deepSleepMin:Math.round(clamp(85-(hard?15:0)+(Math.random()*30-15),30,140)),
      hrv:Math.round(clamp(hrv,25,90)),
      restingHR:Math.round(clamp(rhr,44,68)),
      stress:Math.round(clamp(40+(hard?12:0)+(Math.random()*16-8),15,80)),
      steps:Math.round(6000+Math.random()*6000+(workout?2000:0)),
      workoutDurationMin:Math.round(workout),
      workoutCalories:Math.round(workout*(8+Math.random()*3)),
    });
  }
  return out;
}

/* ── parse initial tab from URL ─────────────────────────────────────── */
function getInitialTab() {
  try {
    const p=new URLSearchParams(window.location.search);
    const t=p.get("tab");
    if(["reading","correlation","coach","data"].includes(t)) return t;
  } catch{}
  return "reading";
}

/* ====================================================================
   ROOT APP
   ==================================================================== */
function App() {
  const [tab,setTab]=useState(getInitialTab());
  const [files,setFiles]=useState([]);
  const [mapping,setMapping]=useState({});
  const [records,setRecords]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [coach,setCoach]=useState(null);
  const [coaching,setCoaching]=useState(false);
  const [question,setQuestion]=useState("");
  const [updateReady,setUpdateReady]=useState(false);

  /* hide splash */
  useEffect(()=>{
    const el=document.getElementById("splash");
    if(el){setTimeout(()=>el.classList.add("fade"),300);}
  },[]);

  /* load persisted data */
  useEffect(()=>{
    (async()=>{
      const s=await loadStore();
      if(s?.records?.length){setRecords(s.records);setMapping(s.mapping||{});setFiles(s.files||[]);}
      setLoaded(true);
    })();
  },[]);

  /* SW update detection */
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.addEventListener("controllerchange",()=>setUpdateReady(true));
  },[]);

  const persist=useCallback((recs,map,fls)=>{saveStore({records:recs,mapping:map,files:fls});},[]);
  const analysis=useMemo(()=>analyze(records),[records]);

  /* import */
  const onFiles=async fileList=>{
    const next=[...files];
    for(const file of Array.from(fileList)){
      const text=await file.text();
      const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
      const cols=parsed.meta.fields||[];
      if(!cols.length) continue;
      const dateCol=cols.find(c=>/date|time|day|日付/i.test(c))||cols[0];
      next.push({idx:next.length,name:file.name,rows:parsed.data,columns:cols,dateCol});
    }
    setFiles(next);
    setMapping(prev=>autoMap(next,prev));
  };
  function autoMap(fls,prev){
    const map={...prev};
    for(const fld of FIELDS){
      if(map[fld.key]) continue;
      for(const f of fls){
        const hit=f.columns.find(c=>fld.kw.some(k=>c.toLowerCase().replace(/[_\s]/g,"").includes(k)));
        if(hit){map[fld.key]=`${f.idx}\u0000${hit}`;break;}
      }
    }
    return map;
  }
  const applyImport=()=>{
    const recs=buildRecords(files,mapping);
    setRecords(recs);persist(recs,mapping,files);setTab("reading");
  };
  const loadSample=()=>{
    const recs=sampleRecords();setRecords(recs);setFiles([]);setMapping({});persist(recs,{},[]);setTab("reading");
  };
  const clearAll=()=>{setRecords([]);setFiles([]);setMapping({});setCoach(null);saveStore({records:[],mapping:{},files:[]});};
  const upsertEntry=rec=>{
    const recs=[...records.filter(r=>r.date!==rec.date),rec].sort((a,b)=>a.date<b.date?-1:1);
    setRecords(recs);persist(recs,mapping,files);
  };
  const deleteEntry=date=>{
    const recs=records.filter(r=>r.date!==date);
    setRecords(recs);persist(recs,mapping,files);
  };

  /* AI coach */
  const runCoach=async userQ=>{
    if(!analysis) return;
    setCoaching(true);setCoach(null);
    const recent=analysis.records.slice(-21).map(r=>({
      date:r.date,condition:r.condition,load:r.load,hrv:r.hrv,
      rhr:r.restingHR,deep:r.deepSleepMin,sleepMin:r.sleepDurationMin,stress:r.stress,
    }));
    const lagTxt=analysis.lags.map(l=>`lag+${l.k}日: r=${isN(l.r)?l.r.toFixed(2):"n/a"}(n=${l.n})`).join(", ");
    const drvTxt=analysis.drivers.slice(0,5).map(d=>`${d.label}: r=${d.r.toFixed(2)}`).join(", ");
    const flagTxt=analysis.flags.map(f=>f.msg).join(" / ")||"なし";
    const sys="あなたは睡眠・HRV・トレーニング負荷データを読むリカバリーコーチです。日本語で、相手の実数値とパターンに基づく具体的で実行可能な助言を簡潔に返します。一般論ではなく、与えられたデータの傾向を根拠として示してください。これは医療診断ではない旨を踏まえ、HRV低下や安静時心拍上昇が続くなど気になる兆候があれば受診を促してください。箇条書き中心、4項目以内。";
    const prompt=`直近データ(JSON): ${JSON.stringify(recent)}\nトレーニング負荷→将来コンディションのラグ相関: ${lagTxt}\n翌日コンディションの予測ドライバー(相関): ${drvTxt}\n直近の即時フラグ: ${flagTxt}\n${userQ?`\nユーザーからの質問: ${userQ}`:""}\n\n上記を踏まえ、コンディション向上のための助言を返してください。`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:prompt}]}),
      });
      const data=await res.json();
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      setCoach(txt||"応答を取得できませんでした。");
    }catch{
      setCoach("AIコーチへの接続に失敗しました。インターネット接続を確認して再試行してください。");
    }finally{setCoaching(false);}
  };

  if(!loaded) return <div style={{background:C.ground,minHeight:"100vh"}}/>;

  const hasData=records.length>0;
  const series=analysis?analysis.records.map(r=>({date:r.date.slice(5),condition:r.condition,load:r.load})):[];

  return (
    <div style={{background:C.ground,minHeight:"100vh",color:C.ink}}>
      {updateReady&&(
        <div style={{background:C.teal,color:"#fff",fontSize:13,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>アップデートがあります</span>
          <button onClick={()=>window.location.reload()} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"4px 12px",borderRadius:6,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <RefreshCw size={12}/> 更新
          </button>
        </div>
      )}

      <div className="max-w-3xl mx-auto px-4" style={{paddingTop:"env(safe-area-inset-top, 16px)",paddingBottom:80}}>
        {/* header */}

/* ── Sparkline ──────────────────────────────────────────────────────── */
function Sparkline({data,color}){
  const valid=data.filter(isN);
  if(valid.length<2) return null;
  const w=120,h=44,min=Math.min(...valid),max=Math.max(...valid),rng=max-min||1;
  const pts=data.map((v,i)=>isN(v)?`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`:null).filter(Boolean).join(" ");
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

/* ── Correlation ────────────────────────────────────────────────────── */
function NoData({msg}){
  return <div style={{fontSize:13,borderRadius:8,padding:"12px 16px",textAlign:"center",background:C.ground,color:C.muted}}>{msg}</div>;
}
function Correlation({a}){
  const noLoad=a.lags.every(l=>!isN(l.r));
  const lagData=a.lags.map(l=>({name:`+${l.k}日`,r:isN(l.r)?Math.round(l.r*100)/100:0,raw:l.r,n:l.n}));
  const strongest=[...a.lags].filter(l=>isN(l.r)).sort((x,y)=>Math.abs(y.r)-Math.abs(x.r))[0];
  return(
    <div className="space-y-4">
      <div className="rounded-xl p-4" style={{background:C.surface,border:`1px solid ${C.line}`}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>トレーニング負荷 → 将来のコンディション</div>
        <p style={{fontSize:12,color:C.muted,marginBottom:12}}>ある日の負荷が、その後 0〜3日のコンディションとどれだけ相関するか。</p>
        {noLoad?<NoData msg="トレーニング負荷を計算できません。データタブで運動時間・歩数・PAIのいずれかを対応づけてください。"/>:(
          <>
            <ResponsiveContainer width="100%" height={170}>
              <BarChart data={lagData} margin={{top:4,right:8,left:-16,bottom:0}}>
                <CartesianGrid stroke={C.line} strokeDasharray="2 4" vertical={false}/>
                <XAxis dataKey="name" tick={{fontSize:11,fill:C.muted,fontFamily:MONO}}/>
                <YAxis domain={[-1,1]} tick={{fontSize:10,fill:C.faint,fontFamily:MONO}}/>
                <Tooltip contentStyle={{fontFamily:MONO,fontSize:12,borderColor:C.line,borderRadius:8}} formatter={(v,n,p)=>[`r=${v} (n=${p.payload.n})`,"相関"]}/>
                <ReferenceLine y={0} stroke={C.faint}/>
                <Bar dataKey="r" radius={[3,3,3,3]}>
                  {lagData.map((d,i)=><Cell key={i} fill={d.raw<0?C.low:C.teal}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
            {strongest&&(
              <div style={{fontSize:12,marginTop:8,borderRadius:8,padding:"8px 12px",background:C.tealSoft,color:C.ink}}>
                最も強い関係は <b style={{fontFamily:MONO}}>+{strongest.k}日後</b>（r={strongest.r.toFixed(2)}）。
                {strongest.r<-0.2?" 高負荷の翌日以降にコンディションが落ちる傾向。回復日の配置を検討。":strongest.r>0.2?" 適度な負荷がむしろ良い状態につながっている可能性。":" 明確な関係は弱め。データが増えると精度が上がります。"}
              </div>
            )}
          </>
        )}
      </div>

      {a.scatter.length>=4&&(
        <div className="rounded-xl p-4" style={{background:C.surface,border:`1px solid ${C.line}`}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>負荷(当日) × コンディション(翌日)</div>
          <ResponsiveContainer width="100%" height={190}>
            <ScatterChart margin={{top:4,right:8,left:-16,bottom:0}}>
              <CartesianGrid stroke={C.line} strokeDasharray="2 4"/>
              <XAxis type="number" dataKey="load" name="負荷" tick={{fontSize:10,fill:C.faint,fontFamily:MONO}}/>
              <YAxis type="number" dataKey="condition" name="翌日コンディション" domain={[0,100]} tick={{fontSize:10,fill:C.faint,fontFamily:MONO}}/>
              <ZAxis range={[50,50]}/>
              <Tooltip contentStyle={{fontFamily:MONO,fontSize:12,borderColor:C.line,borderRadius:8}} cursor={{strokeDasharray:"3 3"}}/>
              <Scatter data={a.scatter} fill={C.teal} fillOpacity={0.7}/>
            </ScatterChart>
          </ResponsiveContainer>
        </div>
      )}

      <div className="rounded-xl p-4" style={{background:C.surface,border:`1px solid ${C.line}`}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>翌日コンディションの予測ドライバー</div>
        <p style={{fontSize:12,color:C.muted,marginBottom:12}}>今日の各指標が翌日のコンディションをどれだけ予測するか。</p>
        {a.drivers.length===0?<NoData msg="相関を計算できるデータが不足しています。"/>:(
          <div className="space-y-2">
            {a.drivers.slice(0,7).map(d=>(
              <div key={d.key} className="flex items-center gap-3">
                <div style={{fontSize:12,width:112,flexShrink:0,color:C.ink}}>{d.label}</div>
                <div style={{flex:1,height:8,borderRadius:4,position:"relative",background:C.ground}}>
                  <div style={{position:"absolute",top:0,height:8,borderRadius:4,background:d.r<0?C.low:C.teal,width:`${Math.min(Math.abs(d.r)*100,100)}%`,left:d.r<0?"auto":"50%",right:d.r<0?"50%":"auto"}}/>
                  <div style={{position:"absolute",top:0,height:8,width:1,left:"50%",background:C.faint}}/>
                </div>
                <div style={{fontFamily:MONO,color:d.r<0?C.low:C.teal,fontSize:12,width:48,textAlign:"right"}}>{d.r.toFixed(2)}</div>
              </div>
            ))}
            <div style={{fontSize:11,color:C.faint,fontFamily:MONO,paddingTop:4}}>中央線=相関ゼロ / 右=正 / 左=負</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── manual entry helpers ───────────────────────────────────────────── */
const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const MANUAL_GROUPS=[
  {title:"睡眠",items:[["sleepScore","睡眠スコア",""],["deepSleepMin","深睡眠","分"],["_sleepH","睡眠 時間","h"],["_sleepM","睡眠 分","m"]]},
  {title:"自律神経・心拍",items:[["hrv","HRV","ms"],["restingHR","安静時心拍","bpm"],["readiness","Readiness",""],["stress","ストレス",""]]},
  {title:"活動",items:[["workoutDurationMin","運動時間","分"],["steps","歩数",""],["pai","PAI",""],["workoutCalories","運動kcal",""]]},
];
function NumIn({label,unit,value,onChange}){

    <div>
      <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:2}}>{label}{unit?` (${unit})`:""}</label>

/* ── DataTab ────────────────────────────────────────────────────────── */
function DataTab({files,mapping,setMapping,onFiles,applyImport,loadSample,clearAll,hasData,records,upsertEntry,deleteEntry}){
  const [date,setDate]=useState(todayISO());
  const [form,setForm]=useState({});
  const [showCsv,setShowCsv]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const editing=records.some(r=>r.date===date);
  const loadForEdit=r=>{
    const f={};
    FIELDS.forEach(fld=>{if(isN(r[fld.key])&&fld.key!=="sleepDurationMin")f[fld.key]=String(r[fld.key]);});
    if(isN(r.sleepDurationMin)){f._sleepH=String(Math.floor(r.sleepDurationMin/60));f._sleepM=String(r.sleepDurationMin%60);}
    setDate(r.date);setForm(f);
    try{window.scrollTo({top:0,behavior:"smooth"});}catch{}
  };
  const save=()=>{
    const rec={date};
    FIELDS.forEach(fld=>{
      if(fld.key==="sleepDurationMin") return;
      const v=parseFloat(form[fld.key]);
      if(isFinite(v)) rec[fld.key]=v;
    });
    const h=parseFloat(form._sleepH),m=parseFloat(form._sleepM);
    if(isFinite(h)||isFinite(m)) rec.sleepDurationMin=(isFinite(h)?h:0)*60+(isFinite(m)?m:0);
    upsertEntry(rec);setForm({});setDate(todayISO());
  };

  const allCols=[];
  files.forEach(f=>f.columns.forEach(c=>allCols.push({value:`${f.idx}\u0000${c}`,label:`${f.name} · ${c}`})));
  const recent=[...records].sort((a,b)=>a.date<b.date?1:-1).slice(0,14);
  const fmtSleep=min=>isN(min)?`${Math.floor(min/60)}h${pad(Math.round(min%60))}`:"—";

  return(
    <div className="space-y-4">
      {/* manual entry */}
      <div className="rounded-xl p-5" style={{background:C.surface,border:`1px solid ${C.line}`}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>記録をつける</div>
        <p style={{fontSize:12,color:C.muted,marginBottom:16}}>毎朝Zeppの画面を見ながら入力。空欄は無視されます。同じ日付で保存すると上書き。</p>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:2}}>日付</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{padding:"6px 8px",borderRadius:6,fontSize:13,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,fontFamily:MONO,outline:"none"}}/>
          {editing&&<span style={{fontSize:11,color:C.teal,marginLeft:8}}>既存の記録を編集中</span>}
        </div>
        {MANUAL_GROUPS.map(g=>(
          <div key={g.title} style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:C.ink,marginBottom:6}}>{g.title}</div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
              {g.items.map(([k,label,unit])=>(
                <NumIn key={k} label={label} unit={unit} value={form[k]} onChange={v=>set(k,v)}/>
              ))}
            </div>
          </div>
        ))}
        <div className="flex gap-2 mt-4">
          <button onClick={save} style={{flex:1,padding:"10px 0",borderRadius:8,fontSize:13,color:"#fff",background:C.teal,border:"none",cursor:"pointer"}}>
            {editing?"上書き保存":"保存"}
          </button>
          <button onClick={()=>{setForm({});setDate(todayISO());}} style={{padding:"10px 16px",borderRadius:8,fontSize:13,background:C.ground,color:C.muted,border:"none",cursor:"pointer"}}>
            クリア
          </button>
        </div>
      </div>

      {/* entries list */}
      {records.length>0&&(
        <div className="rounded-xl p-5" style={{background:C.surface,border:`1px solid ${C.line}`}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>記録一覧 <span style={{color:C.faint,fontWeight:400,fontSize:12}}>（直近{recent.length}件）</span></div>
          <div>
            {recent.map(r=>(
              <div key={r.date} className="flex items-center gap-2 py-2" style={{borderBottom:`1px solid ${C.line}`}}>
                <span style={{fontFamily:MONO,color:C.ink,fontSize:12,width:56,flexShrink:0}}>{r.date.slice(5)}</span>
                <span style={{fontFamily:MONO,color:C.muted,fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  HRV {isN(r.hrv)?r.hrv:"—"} · RHR {isN(r.restingHR)?r.restingHR:"—"} · {fmtSleep(r.sleepDurationMin)} · {isN(r.workoutDurationMin)?r.workoutDurationMin+"m":"—"}
                </span>
                <button onClick={()=>loadForEdit(r)} style={{fontSize:11,padding:"2px 8px",borderRadius:6,color:C.teal,background:"none",border:`1px solid ${C.teal}`,cursor:"pointer"}}>編集</button>
                <button onClick={()=>deleteEntry(r.date)} style={{color:C.faint,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center"}}><Trash2 size={14}/></button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CSV import (collapsible) */}
      <div className="rounded-xl p-5" style={{background:C.surface,border:`1px solid ${C.line}`}}>
        <button onClick={()=>setShowCsv(s=>!s)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14,fontWeight:600,background:"none",border:"none",cursor:"pointer",color:C.ink}}>
          <span>CSVから取り込む</span>
          <span style={{color:C.faint,fontSize:11,fontWeight:400}}>{showCsv?"閉じる":"GDPR一括DL等を使う場合"}</span>
        </button>
        {showCsv&&(
          <div style={{marginTop:16}}>
            <p style={{fontSize:12,color:C.muted,marginBottom:12}}>複数ファイルを選ぶと列を自動推定し、下で調整できます。</p>
            <label style={{display:"block",borderRadius:8,border:`2px dashed ${C.line}`,padding:"20px 16px",textAlign:"center",cursor:"pointer",fontSize:13,color:C.muted}}>
              <Upload size={18} style={{color:C.teal,display:"block",margin:"0 auto 8px"}}/>
              ファイルを選択（.csv 複数可）
              <input type="file" accept=".csv,text/csv" multiple style={{display:"none"}} onChange={e=>onFiles(e.target.files)}/>
            </label>
            {files.length>0&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:12,color:C.ink,marginBottom:4}}>日付列（ファイルごと）</div>
                {files.map(f=>(
                  <div key={f.idx} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontSize:11,color:C.muted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    <select value={f.dateCol} onChange={e=>{f.dateCol=e.target.value;setMapping(m=>({...m}));}}
                      style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.line}`,background:C.ground,color:C.ink}}>
                      {f.columns.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                ))}
                <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:12}}>
                  {FIELDS.map(fld=>(
                    <div key={fld.key} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,width:112,flexShrink:0,color:C.ink}}>{fld.label}</span>
                      <select value={mapping[fld.key]||""} onChange={e=>setMapping(m=>({...m,[fld.key]:e.target.value}))}
                        style={{flex:1,fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,minWidth:0}}>
                        <option value="">— なし —</option>
                        {allCols.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
                <button onClick={applyImport} style={{marginTop:16,width:"100%",padding:"10px 0",borderRadius:8,fontSize:13,color:"#fff",background:C.teal,border:"none",cursor:"pointer"}}>
                  この設定で取り込む（既存に統合）
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* footer actions */}
      <div style={{display:"flex",gap:8}}>
        <button onClick={loadSample} style={{fontSize:11,padding:"6px 12px",borderRadius:8,background:C.tealSoft,color:C.teal,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <FlaskConical size={12}/> サンプル読込
        </button>
        {hasData&&<button onClick={clearAll} style={{fontSize:11,padding:"6px 12px",borderRadius:8,background:"#FBF0EA",color:C.low,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <Trash2 size={12}/> 全消去
        </button>}
      </div>
    </div>
  );
}

/* ── mount ──────────────────────────────────────────────────────────── */
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

<script>
/* ── Service Worker registration ─────────────────────────────────────── */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js", { scope: "./" })
      .then(reg => {
        console.log("[SW] registered:", reg.scope);
        // check for updates every 60s when app is open
        setInterval(() => reg.update(), 60_000);
      })
      .catch(err => console.warn("[SW] registration failed:", err));
  });
}

/* ── iOS "Add to Home Screen" hint ──────────────────────────────────── */
// Show only on iOS Safari, only once per week
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = ("standalone" in navigator) && navigator.standalone;
const lastHint = localStorage.getItem("pwa-hint");
const oneWeekAgo = Date.now() - 7 * 24 * 3600 * 1000;
if (isIOS && !isInStandalone && (!lastHint || Number(lastHint) < oneWeekAgo)) {
  window.addEventListener("load", () => {
    setTimeout(() => {
      const banner = document.getElementById("install-banner");
      if (banner) { banner.style.display = "flex"; localStorage.setItem("pwa-hint", Date.now()); }
    }, 3000);
  });
}

/* ── beforeinstallprompt (Android / Chrome) ─────────────────────────── */
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  // Could show a custom install button here
  // For simplicity, auto-prompt after 5s if not yet installed
  setTimeout(() => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
  }, 5000);
});
</script>
</body>
</html>
