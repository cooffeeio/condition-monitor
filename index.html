<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#15706B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="コンディション" />
  <link rel="manifest" href="./manifest.json" />
  <title>Condition Monitor</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:#E9EDEF;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    #splash{position:fixed;inset:0;background:#15706B;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .4s ease}
    #splash.gone{opacity:0;pointer-events:none}
    @keyframes rot{to{transform:rotate(360deg)}}
    .spin{animation:rot 1s linear infinite;transform-origin:center}
  </style>
</head>
<body>

<div id="splash">
  <svg width="68" height="68" viewBox="0 0 192 192" fill="none">
    <rect width="192" height="192" rx="40" fill="rgba(255,255,255,0.18)"/>
    <path d="M30 96 Q55 55 80 80 Q105 105 125 52 Q148 0 165 96" stroke="white" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div style="color:white;font-size:12px;letter-spacing:.18em;font-weight:500">CONDITION MONITOR</div>
  <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round">
    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
  </svg>
</div>

<div id="root"></div>

<!-- Dependencies -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>
"use strict";

// ─── Quick sanity check before doing anything ────────────────────────
if (!window.React || !window.ReactDOM || !window.Recharts || !window.Papa) {
  document.getElementById("splash").innerHTML =
    '<div style="color:white;text-align:center;padding:24px"><div style="font-size:16px;margin-bottom:8px">⚠ 読み込みエラー</div><div style="font-size:12px;opacity:.8">ネット接続を確認してページを再読込してください</div><br><button onclick="location.reload()" style="background:rgba(255,255,255,.2);border:none;color:white;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer">再読込</button></div>';
  throw new Error("CDN load failed");
}

const e  = React.createElement;
const {useState, useEffect, useMemo, useCallback} = React;
const {
  ResponsiveContainer, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  ScatterChart, Scatter, ZAxis, BarChart, Bar, Cell, ReferenceLine
} = Recharts;

// ─── Inline SVG icons (no external lib needed) ──────────────────────
function Svg(size, color, paths) {
  return e("svg", {
    width: size, height: size, viewBox: "0 0 24 24",
    fill: "none", stroke: color || "currentColor",
    strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: {display:"inline-block", flexShrink:0, verticalAlign:"middle"}
  }, ...paths.map((d,i) => e("path",{key:i,d})));
}
const ic = {
  activity:    (sz,cl) => Svg(sz,cl,["M22 12h-4l-3 9L9 3l-3 9H2"]),
  gitBranch:   (sz,cl) => Svg(sz,cl,["M6 3v12","M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6","M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6","M18 9a9 9 0 0 1-9 9"]),
  message:     (sz,cl) => Svg(sz,cl,["M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"]),
  database:    (sz,cl) => Svg(sz,cl,["M12 2C6.48 2 2 4.24 2 7s4.48 5 10 5 10-2.24 10-5-4.48-5-10-5","M2 7v5c0 2.76 4.48 5 10 5s10-2.24 10-5V7","M2 12v5c0 2.76 4.48 5 10 5s10-2.24 10-5v-5"]),
  alert:       (sz,cl) => Svg(sz,cl,["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0","M12 9v4","M12 17h.01"]),
  check:       (sz,cl) => Svg(sz,cl,["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4 12 14.01l-3-3"]),
  trending:    (sz,cl) => Svg(sz,cl,["M23 6l-9.5 9.5-5-5L1 18","M17 6h6v6"]),
  trash:       (sz,cl) => Svg(sz,cl,["M3 6h18","M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"]),
  flask:       (sz,cl) => Svg(sz,cl,["M9 3h6","M10 3v6l-3.5 9A1 1 0 0 0 7.4 20h9.2a1 1 0 0 0 .9-1.4L14 9V3"]),
  send:        (sz,cl) => Svg(sz,cl,["M22 2 11 13","M22 2 15 22l-4-9-9-4z"]),
  upload:      (sz,cl) => Svg(sz,cl,["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M17 8l-5-5-5 5","M12 3v12"]),
  refresh:     (sz,cl) => Svg(sz,cl,["M23 4v6h-6","M1 20v-6h6","M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"]),
  loader:      (sz,cl) => e("svg",{width:sz,height:sz,viewBox:"0 0 24 24",fill:"none",stroke:cl||"currentColor",strokeWidth:2.5,strokeLinecap:"round",style:{display:"inline-block",flexShrink:0,verticalAlign:"middle"}},
                  e("path",{d:"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83",className:"spin"})),
};

// ─── Design tokens ───────────────────────────────────────────────────
const C = {
  ground:"#E9EDEF", surface:"#FFFFFF", ink:"#16222C", muted:"#5C6B76",
  faint:"#8A97A0", line:"#D3DADE", teal:"#15706B", tealSoft:"#E2EEED",
  low:"#B65A35", mid:"#C0901F", good:"#2E7D5B"
};
const MONO = "ui-monospace,SFMono-Regular,Menlo,monospace";

// ─── Fields ──────────────────────────────────────────────────────────
const FIELDS = [
  {key:"sleepScore",       label:"睡眠スコア",    dir:1,  kw:["sleepscore","score"]},
  {key:"sleepDurationMin", label:"睡眠時間(分)",  dir:1,  kw:["sleeptime","totalsleep","duration","sleepminutes"]},
  {key:"deepSleepMin",     label:"深睡眠(分)",    dir:1,  kw:["deepsleep","deep"]},
  {key:"remSleepMin",      label:"REM睡眠(分)",   dir:1,  kw:["rem"]},
  {key:"hrv",              label:"HRV(ms)",       dir:1,  kw:["hrv","rmssd","variability"]},
  {key:"restingHR",        label:"安静時心拍",    dir:-1, kw:["resting","restheart","rhr","heartrate"]},
  {key:"stress",           label:"ストレス",      dir:-1, kw:["stress","pressure"]},
  {key:"readiness",        label:"Readiness",     dir:1,  kw:["readiness","recovery"]},
  {key:"steps",            label:"歩数",          dir:0,  kw:["steps","step"]},
  {key:"workoutDurationMin",label:"運動時間(分)", dir:0,  kw:["sporttime","workout","exercise","activeminutes"]},
  {key:"workoutCalories",  label:"運動カロリー",  dir:0,  kw:["calorie","kcal","calories"]},
  {key:"pai",              label:"PAI",           dir:0,  kw:["pai"]},
];
const RECOVERY = {readiness:1.4,hrv:1.3,restingHR:1.1,sleepScore:1.1,deepSleepMin:0.9,sleepDurationMin:0.8,stress:0.9};
const SUM_FIELDS = new Set(["steps","workoutDurationMin","workoutCalories"]);

// ─── Math ────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const isN = v => typeof v==="number" && isFinite(v);
const mean = a => a.length ? a.reduce((s,x)=>s+x,0)/a.length : NaN;
const std  = a => {
  if(a.length<2) return NaN;
  const m=mean(a);
  return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));
};
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
function pearson(xs,ys){
  const px=[],py=[];
  for(let i=0;i<xs.length;i++) if(isN(xs[i])&&isN(ys[i])){px.push(xs[i]);py.push(ys[i]);}
  if(px.length<4) return {r:NaN,n:px.length};
  const mx=mean(px),my=mean(py);
  let num=0,dx=0,dy=0;
  for(let i=0;i<px.length;i++){const a=px[i]-mx,b=py[i]-my;num+=a*b;dx+=a*a;dy+=b*b;}
  const den=Math.sqrt(dx*dy);
  return {r:den?num/den:NaN,n:px.length};
}
function normDate(v){
  if(v==null) return null;
  const raw=String(v).trim();
  if(!raw) return null;
  if(/^\d{10,13}$/.test(raw)){const n=Number(raw);const d=new Date(n<1e12?n*1000:n);return isNaN(d)?null:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
  const s=raw.split(/[ T]/)[0].replace(/\//g,"-");
  const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  const d=new Date(s);
  return isNaN(d)?null:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
const addDays=(iso,k)=>{const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+k);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const scoreColor=s=>!isN(s)?C.faint:s>=70?C.good:s>=45?C.mid:C.low;
const scoreLabel=s=>!isN(s)?"—":s>=70?"良好":s>=45?"標準":"要回復";

// ─── Storage ─────────────────────────────────────────────────────────
const SK = "condition-monitor:v1";
async function loadStore(){
  try{if(window.storage){const r=await window.storage.get(SK);if(r)return JSON.parse(r.value);}}catch{}
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch{}
  return null;
}
async function saveStore(obj){
  const j=JSON.stringify(obj);
  try{if(window.storage)await window.storage.set(SK,j);}catch{}
  try{localStorage.setItem(SK,j);}catch{}
}

// ─── Build records from CSV ───────────────────────────────────────────
function buildRecords(files,mapping){
  const day={};
  for(const f of files){
    if(!f.dateCol) continue;
    for(const row of f.rows){
      const date=normDate(row[f.dateCol]);if(!date) continue;
      if(!day[date]) day[date]={date};
      for(const fld of FIELDS){
        const src=mapping[fld.key];if(!src) continue;
        const sep=src.indexOf("\x00");
        const fi=src.slice(0,sep),col=src.slice(sep+1);
        if(Number(fi)!==f.idx) continue;
        const val=parseFloat(String(row[col]).replace(/[^0-9.\-]/g,""));
        if(!isFinite(val)) continue;
        if(SUM_FIELDS.has(fld.key)) day[date][fld.key]=(day[date][fld.key]||0)+val;
        else day[date][fld.key]=val;
      }
    }
  }
  return Object.values(day).sort((a,b)=>a.date<b.date?-1:1);
}

// ─── Analyze ─────────────────────────────────────────────────────────
function analyze(records){
  if(!records||!records.length) return null;
  const stats={};
  for(const fld of FIELDS){const vals=records.map(r=>r[fld.key]).filter(isN);if(vals.length>=3)stats[fld.key]={m:mean(vals),s:std(vals)||1};}
  const wd=records.map(r=>{
    let wsum=0,w=0;
    for(const k in RECOVERY){
      if(!isN(r[k])||!stats[k]) continue;
      const dir=FIELDS.find(f=>f.key===k).dir||1;
      const z=((r[k]-stats[k].m)/stats[k].s)*dir;
      wsum+=z*RECOVERY[k];w+=RECOVERY[k];
    }
    const condition=w?clamp(Math.round(50+14*(wsum/w)),0,100):null;
    let load=0,hasLoad=false;
    if(isN(r.workoutDurationMin)&&r.workoutDurationMin>0){
      const intensity=isN(r.workoutCalories)&&r.workoutCalories>0?clamp(r.workoutCalories/r.workoutDurationMin/8,0.6,2):1;
      load+=r.workoutDurationMin*intensity;hasLoad=true;
    }
    if(isN(r.steps)){load+=(r.steps/1000)*1.5;hasLoad=true;}
    if(isN(r.pai)){load+=r.pai;hasLoad=true;}
    return {...r,condition,load:hasLoad?Math.round(load*10)/10:null};
  });
  const byDate={};wd.forEach(r=>byDate[r.date]=r);
  const lags=[0,1,2,3].map(k=>{
    const xs=[],ys=[];
    wd.forEach(r=>{const t=byDate[addDays(r.date,k)];if(r&&t){xs.push(r.load);ys.push(t.condition);}});
    return {k,...pearson(xs,ys)};
  });
  const dkeys=["load","hrv","restingHR","deepSleepMin","sleepDurationMin","stress","steps","sleepScore"];
  const drivers=dkeys.map(key=>{
    const xs=[],ys=[];
    wd.forEach(r=>{const t=byDate[addDays(r.date,1)];if(r&&t){xs.push(r[key]);ys.push(t.condition);}});
    const lbl=key==="load"?"トレーニング負荷":(FIELDS.find(f=>f.key===key)?.label||key);
    return {key,label:lbl,...pearson(xs,ys)};
  }).filter(d=>isN(d.r)).sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
  const scatter=[];
  wd.forEach(r=>{const t=byDate[addDays(r.date,1)];if(r&&t&&isN(r.load)&&isN(t.condition))scatter.push({load:r.load,condition:t.condition});});
  const flags=[];
  const latest=wd[wd.length-1];
  const prior=wd.slice(-8,-1);
  const baseOf=k=>{const v=prior.map(r=>r[k]).filter(isN);return v.length>=3?mean(v):NaN;};
  if(latest){
    const checks=[
      ["hrv",(l,b)=>l<b*0.9,"HRVが平常より低下（回復が追いついていないサイン）"],
      ["restingHR",(l,b)=>l>b*1.05,"安静時心拍が高め（疲労 or 体調変化の可能性）"],
      ["deepSleepMin",(l,b)=>l<b*0.8,"深睡眠がいつもより少ない"],
      ["sleepDurationMin",(l,b)=>l<b*0.85,"睡眠時間が短い"],
      ["stress",(l,b)=>l>b*1.15,"ストレス指標が高い"],
    ];
    for(const [k,test,msg] of checks){
      const b=baseOf(k);
      if(isN(latest[k])&&isN(b)&&test(latest[k],b)) flags.push({type:"warn",msg});
    }
    if(isN(latest.condition)){
      if(latest.condition>=70) flags.push({type:"good",msg:"コンディション良好。負荷の高いセッションを入れる好機。"});
      else if(latest.condition<45) flags.push({type:"warn",msg:"コンディション低め。今日は強度を落とすか回復を優先。"});
    }
  }
  return {records:wd,stats,lags,drivers,scatter,flags,latest,byDate};
}

// ─── Sample data ─────────────────────────────────────────────────────
function sampleRecords(){
  const out=[];let base=new Date();base.setDate(base.getDate()-29);
  let hrv=55,rhr=52;
  for(let i=0;i<30;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const hard=i%4===1||i%7===0;
    const workout=hard?60+Math.random()*40:(Math.random()<0.4?30:0);
    hrv+=(55-hrv)*0.3+(hard?-8:4)+(Math.random()*6-3);
    rhr+=(52-rhr)*0.3+(hard?3:-1.5)+(Math.random()*2-1);
    out.push({
      date:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
      sleepScore:Math.round(clamp(82-(hard?6:0)+(Math.random()*10-5),50,99)),
      sleepDurationMin:Math.round(clamp(430-(hard?25:0)+(Math.random()*60-30),320,540)),
      deepSleepMin:Math.round(clamp(85-(hard?15:0)+(Math.random()*30-15),30,140)),
      hrv:Math.round(clamp(hrv,25,90)),
      restingHR:Math.round(clamp(rhr,44,68)),
      stress:Math.round(clamp(40+(hard?12:0)+(Math.random()*16-8),15,80)),
      steps:Math.round(6000+Math.random()*6000+(workout?2000:0)),
      workoutDurationMin:Math.round(workout),
      workoutCalories:Math.round(workout*(8+Math.random()*3)),
    });
  }
  return out;
}

// ─── Shared style helpers ─────────────────────────────────────────────
const card  = {background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,padding:16};
const row   = (extra)=>({display:"flex",...extra});
const col   = (extra)=>({display:"flex",flexDirection:"column",...extra});

// ─── Small UI atoms ───────────────────────────────────────────────────
function Metric({label,v,unit}){
  return e("div",{style:{background:C.ground,borderRadius:8,padding:"8px 10px"}},
    e("div",{style:{color:C.faint,fontSize:11,marginBottom:2}},label),
    e("div",{style:{fontFamily:MONO,color:C.ink,fontSize:15,fontWeight:600}},
      isN(v)?v:"—",
      e("span",{style:{color:C.faint,fontSize:11,marginLeft:2}},unit)
    )
  );
}

function Sparkline({data,color}){
  const v=data.filter(isN);
  if(v.length<2) return null;
  const W=110,H=38,mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1;
  const pts=data.map((val,i)=>isN(val)?`${(i/(data.length-1))*W},${H-((val-mn)/rng)*H}`:null).filter(Boolean).join(" ");
  return e("svg",{width:W,height:H,style:{overflow:"visible"}},
    e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"})
  );
}

function NoData({msg}){
  return e("div",{style:{fontSize:12,borderRadius:8,padding:"12px",textAlign:"center",background:C.ground,color:C.muted}},msg);
}

function Flag({f}){
  const good=f.type==="good";
  return e("div",{style:{display:"flex",alignItems:"flex-start",gap:8,borderRadius:8,padding:"9px 12px",fontSize:13,background:good?"#EAF5EF":"#FBF0EA",border:`1px solid ${good?"#BFE3D0":"#EDD2C2"}`}},
    good?ic.check(15,C.good):ic.alert(15,C.low),
    e("span",{style:{color:C.ink,lineHeight:1.5}},f.msg)
  );
}

// ─── READING TAB ─────────────────────────────────────────────────────
function Reading({a,series}){
  const lat=a.latest,cond=lat?.condition,col=scoreColor(cond);
  const spark=a.records.slice(-14).map(r=>r.condition);
  return e("div",{style:col_gap(16)},
    e("div",{style:card},
      e("div",{style:row({justifyContent:"space-between",alignItems:"flex-start"})},
        e("div",null,
          e("div",{style:{fontFamily:MONO,color:C.faint,fontSize:11,letterSpacing:".14em"}},`最新 · ${lat?.date||""}`),
          e("div",{style:row({alignItems:"flex-end",gap:10,marginTop:4})},
            e("div",{style:{fontFamily:MONO,color:col,fontSize:58,lineHeight:1,fontWeight:700}},isN(cond)?cond:"—"),
            e("div",{style:{paddingBottom:5}},
              e("div",{style:{color:col,fontSize:13,fontWeight:600}},scoreLabel(cond)),
              e("div",{style:{color:C.faint,fontSize:11}},"/ 100")
            )
          )
        ),
        e(Sparkline,{data:spark,color:col})
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}},
        e(Metric,{label:"HRV",v:lat?.hrv,unit:"ms"}),
        e(Metric,{label:"安静時心拍",v:lat?.restingHR,unit:"bpm"}),
        e(Metric,{label:"深睡眠",v:lat?.deepSleepMin,unit:"min"}),
        e(Metric,{label:"負荷",v:lat?.load,unit:""})
      )
    ),
    ...a.flags.map((f,i)=>e(Flag,{key:i,f})),
    e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:12}},"コンディション × 負荷"),
      e(ResponsiveContainer,{width:"100%",height:210},
        e(LineChart,{data:series,margin:{top:4,right:8,left:-18,bottom:0}},
          e(CartesianGrid,{stroke:C.line,strokeDasharray:"2 4",vertical:false}),
          e(XAxis,{dataKey:"date",tick:{fontSize:10,fill:C.faint,fontFamily:MONO},interval:"preserveStartEnd"}),
          e(YAxis,{yAxisId:"l",domain:[0,100],tick:{fontSize:10,fill:C.faint,fontFamily:MONO}}),
          e(YAxis,{yAxisId:"r",orientation:"right",tick:{fontSize:10,fill:C.faint,fontFamily:MONO}}),
          e(Tooltip,{contentStyle:{fontFamily:MONO,fontSize:12,borderColor:C.line,borderRadius:8}}),
          e(Line,{yAxisId:"l",type:"monotone",dataKey:"condition",name:"コンディション",stroke:C.teal,strokeWidth:2,dot:false}),
          e(Line,{yAxisId:"r",type:"monotone",dataKey:"load",name:"負荷",stroke:C.low,strokeWidth:1.5,dot:false,strokeDasharray:"3 3"})
        )
      ),
      e("div",{style:{display:"flex",gap:16,marginTop:6,fontSize:11,fontFamily:MONO}},
        e("span",{style:{color:C.teal}},"— コンディション"),
        e("span",{style:{color:C.low}},"-- 負荷")
      )
    )
  );
}

// ─── CORRELATION TAB ─────────────────────────────────────────────────
function Correlation({a}){
  const noLoad=a.lags.every(l=>!isN(l.r));
  const lagData=a.lags.map(l=>({name:`+${l.k}日`,r:isN(l.r)?Math.round(l.r*100)/100:0,raw:l.r,n:l.n}));
  const strongest=[...a.lags].filter(l=>isN(l.r)).sort((x,y)=>Math.abs(y.r)-Math.abs(x.r))[0];
  return e("div",{style:col_gap(16)},
    e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"負荷 → 将来のコンディション"),
      e("div",{style:{fontSize:12,color:C.muted,marginBottom:12}},"ある日の負荷が 0〜3日後のコンディションとどれだけ相関するか。"),
      noLoad
        ? e(NoData,{msg:"運動時間・歩数・PAIのいずれかをデータタブで対応づけてください。"})
        : e("div",null,
            e(ResponsiveContainer,{width:"100%",height:165},
              e(BarChart,{data:lagData,margin:{top:4,right:8,left:-18,bottom:0}},
                e(CartesianGrid,{stroke:C.line,strokeDasharray:"2 4",vertical:false}),
                e(XAxis,{dataKey:"name",tick:{fontSize:11,fill:C.muted,fontFamily:MONO}}),
                e(YAxis,{domain:[-1,1],tick:{fontSize:10,fill:C.faint,fontFamily:MONO}}),
                e(Tooltip,{contentStyle:{fontFamily:MONO,fontSize:12,borderColor:C.line,borderRadius:8},formatter:(v,n,p)=>[`r=${v} (n=${p.payload.n})`,"相関"]}),
                e(ReferenceLine,{y:0,stroke:C.faint}),
                e(Bar,{dataKey:"r",radius:[3,3,3,3]},
                  ...lagData.map((d,i)=>e(Cell,{key:i,fill:d.raw<0?C.low:C.teal}))
                )
              )
            ),
            strongest&&e("div",{style:{fontSize:12,marginTop:8,borderRadius:8,padding:"8px 12px",background:C.tealSoft,color:C.ink}},
              "最も強い関係は ",e("b",{style:{fontFamily:MONO}},`+${strongest.k}日後`),`（r=${strongest.r.toFixed(2)}）。`,
              strongest.r<-0.2?" 高負荷後にコンディションが落ちる傾向。回復日を計画的に。"
              :strongest.r>0.2?" 適度な負荷がコンディション向上に寄与している可能性。"
              :" 明確な相関は弱め。データが増えると精度が上がります。"
            )
          )
    ),
    a.scatter.length>=4&&e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:12}},"負荷(当日) × コンディション(翌日)"),
      e(ResponsiveContainer,{width:"100%",height:185},
        e(ScatterChart,{margin:{top:4,right:8,left:-18,bottom:0}},
          e(CartesianGrid,{stroke:C.line,strokeDasharray:"2 4"}),
          e(XAxis,{type:"number",dataKey:"load",name:"負荷",tick:{fontSize:10,fill:C.faint,fontFamily:MONO}}),
          e(YAxis,{type:"number",dataKey:"condition",name:"翌日コンディション",domain:[0,100],tick:{fontSize:10,fill:C.faint,fontFamily:MONO}}),
          e(ZAxis,{range:[48,48]}),
          e(Tooltip,{contentStyle:{fontFamily:MONO,fontSize:12,borderColor:C.line,borderRadius:8},cursor:{strokeDasharray:"3 3"}}),
          e(Scatter,{data:a.scatter,fill:C.teal,fillOpacity:0.7})
        )
      )
    ),
    e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"翌日コンディションの予測ドライバー"),
      e("div",{style:{fontSize:12,color:C.muted,marginBottom:12}},"今日の各指標が翌日をどれだけ予測するか。"),
      a.drivers.length===0
        ? e(NoData,{msg:"データが不足しています。"})
        : e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            ...a.drivers.slice(0,7).map(d=>
              e("div",{key:d.key,style:{display:"flex",alignItems:"center",gap:8}},
                e("div",{style:{fontSize:11,width:106,flexShrink:0,color:C.ink}},d.label),
                e("div",{style:{flex:1,height:7,borderRadius:4,position:"relative",background:C.ground}},
                  e("div",{style:{position:"absolute",top:0,height:7,borderRadius:4,background:d.r<0?C.low:C.teal,width:`${Math.min(Math.abs(d.r)*100,100)}%`,left:d.r<0?"auto":"50%",right:d.r<0?"50%":"auto"}}),
                  e("div",{style:{position:"absolute",top:0,height:7,width:1,left:"50%",background:C.faint}})
                ),
                e("div",{style:{fontFamily:MONO,color:d.r<0?C.low:C.teal,fontSize:11,width:42,textAlign:"right"}},d.r.toFixed(2))
              )
            ),
            e("div",{style:{fontSize:11,color:C.faint,fontFamily:MONO,paddingTop:4}},"中央線=ゼロ / 右=正 / 左=負")
          )
    )
  );
}

  );

        ic.message(15,C.teal)," パーソナルコーチ"
      ),
      e("div",{style:{fontSize:12,color:C.muted,marginBottom:14}},
        "あなたの実数値・相関・直近の兆候をもとに、具体的な助言を生成します。"
      ),
      e("button",{
        onClick:()=>run(""),disabled:coaching,
        style:{padding:"9px 16px",borderRadius:8,fontSize:13,color:"#fff",background:coaching?C.faint:C.teal,border:"none",cursor:coaching?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6}
      },
        coaching?e("span",{style:{display:"flex",alignItems:"center",gap:6}},ic.loader(14,"white")," 分析中…")
               :e("span",{style:{display:"flex",alignItems:"center",gap:6}},ic.trending(14,"white")," 今のコンディションを分析")
      ),
      e("div",{style:{marginTop:12,display:"flex",gap:8}},

          value:question,onChange:ev=>setQuestion(ev.target.value),

          placeholder:"例: なぜ低い? / 明日登っていい?",
          style:{flex:1,padding:"8px 12px",borderRadius:8,fontSize:13,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,outline:"none"}
        }),
        e("button",{
          onClick:()=>question.trim()&&run(question),
          disabled:coaching||!question.trim(),
          style:{padding:"8px 12px",borderRadius:8,color:"#fff",background:question.trim()&&!coaching?C.teal:C.faint,border:"none",cursor:"pointer",display:"flex",alignItems:"center"}
        }, ic.send(14,"white"))
      )
    ),
    coach&&!coaching&&e("div",{style:{...card,fontSize:13,lineHeight:1.75,whiteSpace:"pre-wrap"}},coach)
  );
}

const todayISO=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const GROUPS=[
  {title:"睡眠",      items:[["sleepScore","睡眠スコア",""],["deepSleepMin","深睡眠","分"],["_sleepH","睡眠 時間","h"],["_sleepM","睡眠 分","m"]]},
  {title:"心拍・自律神経",items:[["hrv","HRV","ms"],["restingHR","安静時心拍","bpm"],["readiness","Readiness",""],["stress","ストレス",""]]},
  {title:"活動",      items:[["workoutDurationMin","運動時間","分"],["steps","歩数",""],["pai","PAI",""],["workoutCalories","運動kcal",""]]},
];
function NumIn({label,unit,value,onChange}){
  return e("div",null,
    e("label",{style:{fontSize:11,color:C.muted,display:"block",marginBottom:2}},label+(unit?` (${unit})`:"")),
    e("input",{type:"number",inputMode:"decimal",value:value??"",onChange:ev=>onChange(ev.target.value),placeholder:"—",
      style:{width:"100%",padding:"6px 8px",borderRadius:6,fontSize:13,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,fontFamily:MONO,outline:"none"}})
  );
}

function DataTab({files,mapping,setMapping,onFiles,applyImport,loadSample,clearAll,hasData,records,upsertEntry,deleteEntry}){
  const [date,setDate]=useState(todayISO());
  const [form,setForm]=useState({});
  const [showCsv,setShowCsv]=useState(false);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const editing=records.some(r=>r.date===date);
  const loadEdit=r=>{
    const f={};
    FIELDS.forEach(fld=>{if(isN(r[fld.key])&&fld.key!=="sleepDurationMin")f[fld.key]=String(r[fld.key]);});
    if(isN(r.sleepDurationMin)){f._sleepH=String(Math.floor(r.sleepDurationMin/60));f._sleepM=String(r.sleepDurationMin%60);}
    setDate(r.date);setForm(f);
    try{window.scrollTo({top:0,behavior:"smooth"});}catch{}
  };
  const save=()=>{
    const rec={date};
    FIELDS.forEach(fld=>{
      if(fld.key==="sleepDurationMin") return;
      const v=parseFloat(form[fld.key]);if(isFinite(v))rec[fld.key]=v;
    });
    const h=parseFloat(form._sleepH),m=parseFloat(form._sleepM);
    if(isFinite(h)||isFinite(m))rec.sleepDurationMin=(isFinite(h)?h:0)*60+(isFinite(m)?m:0);
    upsertEntry(rec);setForm({});setDate(todayISO());
  };
  const allCols=[];
  files.forEach(f=>f.columns.forEach(c=>allCols.push({value:`${f.idx}\x00${c}`,label:`${f.name} · ${c}`})));
  const recent=[...records].sort((a,b)=>a.date<b.date?1:-1).slice(0,14);
  const fmtSleep=min=>isN(min)?`${Math.floor(min/60)}h${pad(Math.round(min%60))}`:"—";
  return e("div",{style:col_gap(16)},
    e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"記録をつける"),
      e("div",{style:{fontSize:12,color:C.muted,marginBottom:14}},"Zeppの画面を見ながら入力。空欄は無視されます。"),
      e("div",{style:{marginBottom:14}},
        e("label",{style:{fontSize:11,color:C.muted,display:"block",marginBottom:2}},"日付"),
        e("input",{type:"date",value:date,onChange:ev=>setDate(ev.target.value),
          style:{padding:"6px 8px",borderRadius:6,fontSize:13,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,fontFamily:MONO,outline:"none"}}),
        editing&&e("span",{style:{fontSize:11,color:C.teal,marginLeft:8}},"編集中")
      ),
      ...GROUPS.map(g=>e("div",{key:g.title,style:{marginBottom:12}},
        e("div",{style:{fontSize:12,fontWeight:600,color:C.ink,marginBottom:6}},g.title),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          ...g.items.map(([k,label,unit])=>e(NumIn,{key:k,label,unit,value:form[k],onChange:v=>setF(k,v)}))
        )
      )),
      e("div",{style:{display:"flex",gap:8,marginTop:14}},
        e("button",{onClick:save,style:{flex:1,padding:"10px",borderRadius:8,fontSize:13,color:"#fff",background:C.teal,border:"none",cursor:"pointer"}},
          editing?"上書き保存":"保存"),
        e("button",{onClick:()=>{setForm({});setDate(todayISO());},
          style:{padding:"10px 14px",borderRadius:8,fontSize:13,background:C.ground,color:C.muted,border:"none",cursor:"pointer"}},"クリア")
      )
    ),
    records.length>0&&e("div",{style:card},
      e("div",{style:{fontSize:14,fontWeight:600,marginBottom:10}},
        "記録一覧 ",e("span",{style:{color:C.faint,fontWeight:400,fontSize:12}},`直近${recent.length}件`)
      ),
      e("div",null,
        ...recent.map(r=>e("div",{key:r.date,style:{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.line}`}},
          e("span",{style:{fontFamily:MONO,color:C.ink,fontSize:12,width:52,flexShrink:0}},r.date.slice(5)),
          e("span",{style:{fontFamily:MONO,color:C.muted,fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
            `HRV:${isN(r.hrv)?r.hrv:"—"} RHR:${isN(r.restingHR)?r.restingHR:"—"} ${fmtSleep(r.sleepDurationMin)} ${isN(r.workoutDurationMin)?r.workoutDurationMin+"m":"—"}`
          ),
          e("button",{onClick:()=>loadEdit(r),style:{fontSize:11,padding:"2px 8px",borderRadius:6,color:C.teal,background:"none",border:`1px solid ${C.teal}`,cursor:"pointer"}},"編集"),
          e("button",{onClick:()=>deleteEntry(r.date),style:{color:C.faint,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",padding:4}},ic.trash(14,C.faint))
        ))
      )
    ),
    e("div",{style:card},
      e("button",{onClick:()=>setShowCsv(s=>!s),style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14,fontWeight:600,background:"none",border:"none",cursor:"pointer",color:C.ink,padding:0}},
        "CSVから取り込む",
        e("span",{style:{color:C.faint,fontSize:11,fontWeight:400}},showCsv?"閉じる":"GDPR一括DL等")
      ),
      showCsv&&e("div",{style:{marginTop:14}},
        e("label",{style:{display:"block",borderRadius:8,border:`2px dashed ${C.line}`,padding:"18px 14px",textAlign:"center",cursor:"pointer",fontSize:13,color:C.muted}},
          ic.upload(18,C.teal),
          e("div",{style:{marginTop:6}},"ファイルを選択（.csv 複数可）"),
          e("input",{type:"file",accept:".csv,text/csv",multiple:true,style:{display:"none"},onChange:ev=>onFiles(ev.target.files)})
        ),
        files.length>0&&e("div",{style:{marginTop:14}},
          ...files.map(f=>e("div",{key:f.idx,style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            e("span",{style:{fontSize:11,color:C.muted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},f.name),
            e("select",{value:f.dateCol,onChange:ev=>{f.dateCol=ev.target.value;setMapping(m=>({...m}));},
              style:{fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${C.line}`,background:C.ground,color:C.ink}},
              ...f.columns.map(c=>e("option",{key:c,value:c},c))
            )
          )),
          e("div",{style:{display:"flex",flexDirection:"column",gap:6,marginTop:12}},
            ...FIELDS.map(fld=>e("div",{key:fld.key,style:{display:"flex",alignItems:"center",gap:8}},
              e("span",{style:{fontSize:11,width:100,flexShrink:0,color:C.ink}},fld.label),
              e("select",{value:mapping[fld.key]||"",onChange:ev=>setMapping(m=>({...m,[fld.key]:ev.target.value})),
                style:{flex:1,fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${C.line}`,background:C.ground,color:C.ink,minWidth:0}},
                e("option",{value:""},"— なし —"),
                ...allCols.map(c=>e("option",{key:c.value,value:c.value},c.label))
              )
            ))
          ),
          e("button",{onClick:applyImport,style:{marginTop:14,width:"100%",padding:"10px",borderRadius:8,fontSize:13,color:"#fff",background:C.teal,border:"none",cursor:"pointer"}},
            "この設定で取り込む（既存に統合）"
          )
        )
      )
    ),
    e("div",{style:{display:"flex",gap:8}},
      e("button",{onClick:loadSample,style:{fontSize:12,padding:"7px 12px",borderRadius:8,background:C.tealSoft,color:C.teal,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
        ic.flask(13,C.teal)," サンプル読込"
      ),
      hasData&&e("button",{onClick:clearAll,style:{fontSize:12,padding:"7px 12px",borderRadius:8,background:"#FBF0EA",color:C.low,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
        ic.trash(13,C.low)," 全消去"
      )
    )
  );
}

// ─── Layout helpers ───────────────────────────────────────────────────
function col_gap(g){return {display:"flex",flexDirection:"column",gap:g};}

// ─── ROOT ─────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]     = useState("reading");
  const [files,setFiles] = useState([]);
  const [mapping,setMapping] = useState({});
  const [records,setRecords] = useState([]);
  const [loaded,setLoaded]   = useState(false);
  const [coach,setCoach]     = useState(null);
  const [coaching,setCoaching] = useState(false);
  const [question,setQuestion] = useState("");
  const [updateReady,setUpdateReady] = useState(false);

  useEffect(()=>{
    // 1. Hide splash as soon as React paints
    requestAnimationFrame(()=>{
      const sp=document.getElementById("splash");
      if(sp) setTimeout(()=>sp.classList.add("gone"),100);
    });
    // 2. Load persisted data
    loadStore().then(s=>{
      if(s?.records?.length){
        setRecords(s.records);
        setMapping(s.mapping||{});
        setFiles(s.files||[]);
      }
      setLoaded(true);
    }).catch(()=>setLoaded(true));
    // 3. SW update detection
    if("serviceWorker" in navigator){
      navigator.serviceWorker.addEventListener("controllerchange",()=>setUpdateReady(true));
    }
  },[]);

  const persist=useCallback((recs,map,fls)=>{saveStore({records:recs,mapping:map,files:fls});},[]);
  const analysis=useMemo(()=>analyze(records),[records]);

  function autoMap(fls,prev){
    const map={...prev};
    for(const fld of FIELDS){
      if(map[fld.key]) continue;
      for(const f of fls){
        const hit=f.columns.find(c=>fld.kw.some(k=>c.toLowerCase().replace(/[_\s]/g,"").includes(k)));
        if(hit){map[fld.key]=`${f.idx}\x00${hit}`;break;}
      }
    }
    return map;
  }
  const onFiles=async fileList=>{
    const next=[...files];
    for(const file of Array.from(fileList)){
      const text=await file.text();
      const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
      const cols=parsed.meta.fields||[];if(!cols.length)continue;
      const dateCol=cols.find(c=>/date|time|day|日付/i.test(c))||cols[0];
      next.push({idx:next.length,name:file.name,rows:parsed.data,columns:cols,dateCol});
    }
    setFiles(next);setMapping(prev=>autoMap(next,prev));
  };
  const applyImport=()=>{const recs=buildRecords(files,mapping);setRecords(recs);persist(recs,mapping,files);setTab("reading");};
  const loadSample=()=>{const recs=sampleRecords();setRecords(recs);setFiles([]);setMapping({});persist(recs,{},[]);setTab("reading");};
  const clearAll=()=>{setRecords([]);setFiles([]);setMapping({});setCoach(null);saveStore({records:[],mapping:{},files:[]});};
  const upsertEntry=rec=>{const recs=[...records.filter(r=>r.date!==rec.date),rec].sort((a,b)=>a.date<b.date?-1:1);setRecords(recs);persist(recs,mapping,files);};
  const deleteEntry=date=>{const recs=records.filter(r=>r.date!==date);setRecords(recs);persist(recs,mapping,files);};

  const runCoach=async userQ=>{
    if(!analysis)return;
    setCoaching(true);setCoach(null);
    const recent=analysis.records.slice(-21).map(r=>({date:r.date,cond:r.condition,load:r.load,hrv:r.hrv,rhr:r.restingHR,deep:r.deepSleepMin,sleepMin:r.sleepDurationMin,stress:r.stress}));
    const lagTxt=analysis.lags.map(l=>`+${l.k}日:r=${isN(l.r)?l.r.toFixed(2):"n/a"}`).join(",");
    const drvTxt=analysis.drivers.slice(0,5).map(d=>`${d.label}:${d.r.toFixed(2)}`).join(",");
    const flagTxt=analysis.flags.map(f=>f.msg).join(" / ")||"なし";
    const sys="あなたは睡眠・HRV・トレーニング負荷データを読むリカバリーコーチです。日本語で、相手の実数値とパターンに基づく具体的で実行可能な助言を簡潔に返します。一般論ではなく、与えられたデータの傾向を根拠として示してください。これは医療診断ではない旨を踏まえ、HRV低下や安静時心拍上昇が続くなど気になる兆候があれば受診を促してください。箇条書き中心、4項目以内。";
    const prompt=`直近データ:${JSON.stringify(recent)}\nラグ相関:${lagTxt}\nドライバー:${drvTxt}\nフラグ:${flagTxt}${userQ?`\n質問:${userQ}`:""}\n助言を返してください。`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setCoach((data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||"応答を取得できませんでした。");
    }catch{
      setCoach("AIコーチへの接続に失敗しました。インターネット接続を確認してください。");
    }finally{setCoaching(false);}
  };

  if(!loaded) return null;

  const hasData=records.length>0;
  const series=analysis?analysis.records.map(r=>({date:r.date.slice(5),condition:r.condition,load:r.load})):[];
  const TABS=[
    ["reading","今日",    (sz,cl)=>ic.activity(sz,cl)],
    ["correlation","相関",(sz,cl)=>ic.gitBranch(sz,cl)],
    ["coach","コーチ",   (sz,cl)=>ic.message(sz,cl)],
    ["data","データ",    (sz,cl)=>ic.database(sz,cl)],
  ];

  return e("div",{style:{background:C.ground,minHeight:"100vh",color:C.ink}},
    updateReady&&e("div",{style:{background:C.teal,color:"#fff",fontSize:13,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      "アップデートがあります",
      e("button",{onClick:()=>window.location.reload(),style:{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",padding:"4px 12px",borderRadius:6,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
        ic.refresh(12,"white")," 更新"
      )
    ),
    e("div",{style:{maxWidth:672,margin:"0 auto",padding:"16px 16px 96px"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}},
        e("div",null,
          e("div",{style:{fontFamily:MONO,color:C.teal,letterSpacing:".18em",fontSize:11}},"CONDITION MONITOR"),
          e("h1",{style:{fontSize:18,fontWeight:600,margin:0}},"身体データ統合モニター")
        ),
        e("div",{style:{fontFamily:MONO,fontSize:11,textAlign:"right"}},
          e("div",{style:{color:C.faint}},"記録"),
          e("div",{style:{color:C.ink}},records.length+" 日分")
        )
      ),
      e("div",{style:{display:"flex",gap:4,margin:"14px 0 18px",padding:4,borderRadius:10,background:C.surface,border:`1px solid ${C.line}`}},
        ...TABS.map(([id,label,getIc])=>e("button",{key:id,onClick:()=>setTab(id),
          style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"8px 4px",borderRadius:7,border:"none",fontSize:12,cursor:"pointer",
            background:tab===id?C.teal:"none",color:tab===id?"#fff":C.muted,fontWeight:tab===id?600:400}},
          getIc(14,tab===id?"#fff":C.muted)," ",label
        ))
      ),
      !hasData&&tab!=="data" ? e(Empty,{onSample:loadSample,onImport:()=>setTab("data")})
      : tab==="reading"     ? e(Reading,{a:analysis,series})
      : tab==="correlation" ? e(Correlation,{a:analysis})
      : tab==="coach"       ? e(Coach,{hasData,coach,coaching,question,setQuestion,run:runCoach})
      : tab==="data"        ? e(DataTab,{files,mapping,setMapping,onFiles,applyImport,loadSample,clearAll,hasData,records,upsertEntry,deleteEntry})
      : null,
      e("p",{style:{fontSize:11,textAlign:"center",color:C.faint,marginTop:24}},
        "一般的な健康・トレーニング情報であり医療診断ではありません。気になる兆候が続く場合は専門家に相談を。"
      )
    ),
    e("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.line}`,paddingBottom:"env(safe-area-inset-bottom)",display:"flex",zIndex:100}},
      ...TABS.map(([id,label,getIc])=>e("button",{key:id,onClick:()=>setTab(id),
        style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 0",border:"none",background:"none",cursor:"pointer",
          color:tab===id?C.teal:C.faint,fontSize:10,fontWeight:tab===id?600:400,gap:3}},
        getIc(20,tab===id?C.teal:C.faint),label
      ))
    )
  );
}

// ─── Mount ───────────────────────────────────────────────────────────
try {
  ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
} catch(err) {
  document.getElementById("splash").innerHTML =
    '<div style="color:white;text-align:center;padding:24px"><div style="font-size:15px;margin-bottom:8px">⚠ 起動エラー</div><div style="font-size:12px;opacity:.8">'+err.message+'</div><br><button onclick="location.reload()" style="background:rgba(255,255,255,.2);border:none;color:white;padding:8px 20px;border-radius:8px;cursor:pointer">再読込</button></div>';
  document.getElementById("splash").style.opacity="1";
  document.getElementById("splash").style.pointerEvents="all";
  throw err;
}
</script>

<script>
// Service Worker
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js",{scope:"./"})
      .then(r=>setInterval(()=>r.update(),60000))
      .catch(err=>console.warn("[SW]",err));
  });
}
// iOS "add to home screen" hint (once per week)
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone){
  const last=localStorage.getItem("pwa-hint");
  if(!last||Date.now()-Number(last)>7*864e5){
    setTimeout(()=>{
      const b=document.createElement("div");
      b.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#15706B;color:white;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));z-index:9999;font-size:13px";
      b.innerHTML='<b>ホーム画面に追加できます</b><div style="font-size:12px;opacity:.8;margin-top:2px">Safari → 共有（□↑）→「ホーム画面に追加」</div><button onclick="this.parentElement.remove()" style="margin-top:8px;background:rgba(255,255,255,.2);border:none;color:white;padding:5px 14px;border-radius:8px;font-size:12px;cursor:pointer">閉じる</button>';
      document.body.appendChild(b);
      localStorage.setItem("pwa-hint",Date.now());
    },3000);
  }
}
</script>
</body>
</html>
